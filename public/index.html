<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK HUB | Dashboard Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h2>KETICK <span>HUB</span></h2>
        </div>
        <div class="user-profile">
            <span class="badge">MASTER</span>
        </div>
    </header>

    <main class="dashboard-content">
        <section class="overview-cards">
            <div class="card">
                <p>Total Deployments</p>
                <h3 id="total-deploy">0</h3>
            </div>
            <div class="card alert">
                <p>Fraud Alerts</p>
                <h3 id="fraud-alerts">0</h3>
            </div>
        </section>

        <section class="client-monitor">
            <div class="section-title">
                <h3>Empire Monitoring</h3>
                <button class="btn-refresh" onclick="loadDeployments()">↻</button>
            </div>
            <div id="deployment-list" class="list-container">
                <p class="loading">Menghubungkan ke Cloud...</p>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
